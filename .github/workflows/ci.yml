# =============================================================================
# AutoFirm CI -- the enforcement plane for the ADR-001 gates (CLAUDE.md §5.5/§5.6).
#
# Why this exists
# ---------------
# ADR-001 §3/§4 NAME the gates (lint, types, schema/import contract, tests +
# coverage, mutation = ACCEPTANCE SIGNAL, SAST, secret-scan) but until now they
# were not ENFORCED anywhere -- `.github/workflows/` was empty, and the Makefile's
# `mutation` target ignored mutmut's exit code. This workflow makes every gate
# real and FAIL-CLOSED: a red gate (or a tool that cannot run) fails the build;
# nothing is skipped (CLAUDE.md §5.6).
#
# Why Linux
# ---------
# ADR-001's "Native-Windows caveat" pins CI + the isolation boundary to Linux
# containers. The mutation gate specifically REQUIRES Linux: on native Windows,
# mutmut 2.x cannot abort an infinite-loop mutant (e.g. a mutated `while` bound in
# the Merkle modules), so the full mutation pass stalls. On Linux the signal-based
# per-test timeout aborts such mutants, so the FULL pass over ALL audit modules
# completes and the gate can fail closed on any survivor. See
# docs/architecture/experiments/E5-tamper-evident-log-results.md ("Known tooling
# limitation").
# =============================================================================

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *" # nightly mutation backstop (04:00 UTC); fast gates still run per-push
  workflow_dispatch:
    # On-demand mutation runs. §7.2: full-tree scope has cancelled at 6h+, so
    # allow scoping a dispatch to changed/critical modules. Empty = full tree
    # (the nightly/schedule behaviour is unchanged).
    inputs:
      paths:
        description: "Optional space-separated module paths to scope the mutation gate (default: full tree)"
        required: false
        default: ""

# Least privilege: read-only token (CLAUDE.md §5.6); no write scopes needed.
permissions:
  contents: read

# Concurrency: keep fast per-push/PR feedback snappy by cancelling SUPERSEDED
# fast runs, but NEVER let a push cancel the long mutation-gate run. The mutation
# gate (schedule/workflow_dispatch) gets its own group with cancel-in-progress
# disabled so a push (which only runs the fast gates) cannot cancel an in-flight
# mutation pass; a second mutation run queues instead of cancelling the first.
concurrency:
  group: >-
    ci-${{ github.ref }}-${{
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && 'mutation' || 'fast' }}
  cancel-in-progress: >-
    ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1-5: lint -> types -> import contract -> tests + coverage -> SAST.
  # Cheapest + most-likely-to-fail first (ADR-001 §3), fail-fast within the job.
  # ---------------------------------------------------------------------------
  gates:
    name: lint / types / contract / tests+coverage / sast
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (runtime + dev + test extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,test,artifacts,cockpit]"

      - name: Gate 1a -- ruff lint (self-documenting-name + style)
        run: python -m ruff check src tests scripts

      - name: Gate 1b -- mypy --strict (type gate)
        run: python -m mypy

      - name: Gate 2 -- import-linter contract (runtime must not import analysis libs)
        run: python -m importlinter.cli lint

      - name: Gate 3+5 -- pytest with branch coverage (fails < 90% line via pyproject)
        run: python -m pytest

      - name: Gate -- Bandit SAST (fail on confirmed high/critical)
        run: python -m bandit -q -r src -c pyproject.toml

  # ---------------------------------------------------------------------------
  # Secret-scanning gate (ADR-001 §4): fail the build on ANY committed secret.
  # gitleaks runs natively on Linux; a scanner that cannot run is a FAILED gate.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      # We invoke the gitleaks BINARY directly rather than gitleaks/gitleaks-action@v2.
      # Why (CLAUDE.md §5.6 -- "a scanner that cannot run is a FAILED gate", and §7.2
      # -- "make the gate correct + deterministic, not weaker"): the wrapper action is
      # license-gated for org accounts and validates the licence via a GitHub API call.
      # When that call hits the shared GitHub API rate limit the action ABORTS with
      # "missing gitleaks license" and fails the step WITHOUT EVER SCANNING -- a flaky,
      # network-dependent false failure (this is exactly why an earlier identical-content
      # run passed and a later one failed). The OSS gitleaks CLI (MIT) has no licence
      # check and no GitHub API dependency, so the gate becomes deterministic. It is
      # STRONGER, not weaker: still full-history, still uses .gitleaks.toml, still
      # fail-closed -- `gitleaks detect` exits non-zero on ANY finding, failing the job.
      - name: Install gitleaks (pinned, OSS binary -- no licence/API dependency)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: gitleaks (fail-closed on any finding -- full history, .gitleaks.toml)
        # `detect` scans the whole git history; --config uses our scoped allowlist;
        # --no-banner keeps logs clean; default exit code 1 on findings fails the gate.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose

  # ---------------------------------------------------------------------------
  # Gate 6: the MUTATION GATE -- the ACCEPTANCE SIGNAL (ADR-001 §3 step 6;
  # CLAUDE.md §3.6). Runs the FULL mutmut pass over ALL mutated modules
  # (pyproject `paths_to_mutate` = src/autofirm/) on Linux, then fails the build
  # on ANY surviving / timed-out / suspicious / untested mutant. This is the gate
  # that could not run on the Windows dev box; CI is its enforcement plane.
  # ---------------------------------------------------------------------------
  mutation-gate:
    name: mutation gate (nightly/manual backstop, fail-closed on survivors)
    # Mutation is the real acceptance signal but the full pass is SLOW -- iterate it
    # LOCALLY before merging; in CI it runs only nightly + on-demand, so it never
    # blocks or red-spams everyday pushes/PRs to main. NOT weakened: still fail-closed
    # on any survivor when it runs (per-push gets the fast lint/type/test/cov/SAST).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [gates] # only spend mutation time once the cheap gates are green
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (runtime + test extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,artifacts,cockpit]"

      - name: Run the mutation gate (fail-closed on any survivor)
        # The helper runs `mutmut run` over pyproject's paths_to_mutate (or the
        # dispatch-supplied subset via --paths), then grades the result cache
        # directly (mutmut's own `results` printer is broken under Python 3.13 +
        # pony-orm). Non-zero exit on any survivor. The dispatch input is passed
        # via env, never interpolated into the shell, to avoid script injection
        # (GitHub Actions security best practice).
        env:
          MUTATION_PATHS: ${{ inputs.paths }}
        run: |
          if [ -n "$MUTATION_PATHS" ]; then
            python scripts/run_mutation_gate.py --paths $MUTATION_PATHS
          else
            python scripts/run_mutation_gate.py
          fi
